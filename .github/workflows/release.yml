name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: pnpm dist:mac
          - name: Windows
            os: windows-latest
            command: pnpm dist:win
          - name: Linux
            os: ubuntu-latest
            command: pnpm dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux package dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Prepare KataGo assets
        shell: bash
        env:
          KATASENSEI_KATAGO_ASSET_DIR: ${{ secrets.KATASENSEI_KATAGO_ASSET_DIR }}
          KATASENSEI_KATAGO_BINARY: ${{ secrets.KATASENSEI_KATAGO_BINARY }}
          KATASENSEI_KATAGO_MODEL: ${{ secrets.KATASENSEI_KATAGO_MODEL }}
        run: |
          node scripts/prepare_katago_assets.mjs
          node scripts/check_katago_assets.mjs --mode=release

      - name: Package desktop app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: ${{ matrix.command }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: katasensei-${{ matrix.name }}
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.dmg
            release/**/*.exe
            release/**/*.zip
            release/**/*.tar.gz
            release/**/*.yml
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
